name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (no pcap)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build -o bin/sipvault-agent ./cmd/sipvault-agent

  test-pcap:
    name: test (pcap)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y libpcap-dev
      - run: go build -tags pcap -o bin/sipvault-agent-pcap ./cmd/sipvault-agent
      - run: go test -race -tags pcap ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
